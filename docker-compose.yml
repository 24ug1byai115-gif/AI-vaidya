services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CHROMA_PERSIST_DIR=/data/chroma
      - UPLOAD_DIR=/data/uploads
      - CORS_ORIGINS=http://localhost:3000,http://web:3000
    env_file:
      - .env
    volumes:
      - chroma_data:/data/chroma
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aivaidya
      POSTGRES_PASSWORD: aivaidya
      POSTGRES_DB: aivaidya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivaidya -d aivaidya"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chroma_data:
  uploads:
  pgdata:
